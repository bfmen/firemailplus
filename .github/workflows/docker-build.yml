name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      go_base_image:
        description: Go builder base image or mirror
        required: false
        default: golang:1.24-alpine
      node_base_image:
        description: Node builder/runtime base image or mirror
        required: false
        default: node:20-alpine

env:
  REGISTRY: docker.io
  IMAGE_NAME: luofengyuan/firemailplus
  GO_BASE_IMAGE: ${{ inputs.go_base_image || 'golang:1.24-alpine' }}
  NODE_BASE_IMAGE: ${{ inputs.node_base_image || 'node:20-alpine' }}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact-name: digest-linux-amd64
          - platform: linux/arm64
            artifact-name: digest-linux-arm64
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=branch
          type=ref,event=tag
          type=sha,prefix={{branch}}-

    - name: Build and push ${{ matrix.platform }} image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: ${{ matrix.platform }}
        push: true
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.platform }}
        cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
        pull: true
        build-args: |
          GO_BASE_IMAGE=${{ env.GO_BASE_IMAGE }}
          NODE_BASE_IMAGE=${{ env.NODE_BASE_IMAGE }}
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact-name }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
    - name: Download digests
      uses: actions/download-artifact@v7
      with:
        pattern: digest-*
        path: /tmp/digests
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=sha,prefix={{branch}}-

    - name: Create and push manifest
      run: |
        set -euo pipefail
        image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        digests=""
        for digest_file in /tmp/digests/*; do
          digest="$(basename "${digest_file}")"
          digests="${digests} ${image}@sha256:${digest}"
        done

        while read -r tag; do
          [ -n "$tag" ] || continue
          docker buildx imagetools create -t "$tag" $digests
        done <<< "${{ steps.meta.outputs.tags }}"
