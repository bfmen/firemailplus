# FireMailPlus OpenAPI contract.
# This file is hand-written source. Generated artifacts must be produced from it.
openapi: 3.0.3
info:
  title: FireMailPlus API
  version: 0.3.0
  license:
    name: Proprietary
  description: |
    Contract-first API definition for the stable FireMailPlus `/api/v1`
    backend surface.

    This Phase 1 contract intentionally includes only routes that are
    registered in the production Gin router. Dead, unregistered, fake-success,
    or schema-blocked handlers remain excluded until their repair tasks are
    completed.
servers:
  - url: /
    description: Relative server URL
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health endpoints.
  - name: Auth
    description: Authentication endpoints.
  - name: OAuth
    description: OAuth account connection endpoints.
  - name: Accounts
    description: Email account management endpoints.
  - name: Providers
    description: Provider metadata and detection endpoints.
  - name: Emails
    description: Email list, detail, state, reply, forward, send, and batch endpoints.
  - name: Folders
    description: Mail folder management endpoints.
  - name: Groups
    description: Email account group management endpoints.
  - name: Attachments
    description: Attachment upload, download, preview, and email attachment endpoints.
  - name: SSE
    description: Server-sent event endpoints.
paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Check service health
      description: Returns the FireMailPlus service liveness status.
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/LoginSuccess'
        '400':
