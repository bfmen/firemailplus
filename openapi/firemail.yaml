        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    queryToken:
      type: apiKey
      in: query
      name: token
      description: Browser EventSource compatibility token. Server logs must redact this value.
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TablePath:
      name: table
      in: path
      required: true
      schema:
        type: string
        enum: [emails, email_accounts, folders, attachments, users]
    ProviderPath:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [gmail, outlook]
    CallbackUrlQuery:
      name: callback_url
      in: query
      required: false
      schema:
        type: string
        format: uri
    AccountIdQuery:
      name: account_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
    FolderIdQuery:
      name: folder_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    TokenQuery:
      name: token
      in: query
      required: false
      schema:
        type: string
  requestBodies:
    JsonBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    Success:
      description: Operation succeeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    LoginSuccess:
      description: Login succeeded.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoginResponse'
    UserSuccess:
      description: User response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
    OAuthInitSuccess:
      description: OAuth initialization response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OAuthInitResponse'
    OAuthTokenSuccess:
      description: OAuth token response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OAuthTokenResponse'
    EmailAccountSuccess:
      description: Email account response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/EmailAccount'
    EmailAccountsSuccess:
      description: Email account list response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmailAccount'
    EmailsPageSuccess:
      description: Email page response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/EmailPage'
    EmailSuccess:
      description: Email response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Email'
    FolderSuccess:
      description: Folder response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Folder'
    FoldersSuccess:
      description: Folder list response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Folder'
    EmailGroupSuccess:
      description: Email group response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/EmailGroup'
    EmailGroupsSuccess:
      description: Email group list response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmailGroup'
    AttachmentSuccess:
      description: Attachment response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Attachment'
    AttachmentsSuccess:
      description: Attachment list response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Attachment'
    SseStream:
      description: Server-sent event stream.
      content:
        text/event-stream:
          schema:
            type: string
            description: EventSource stream with named events and JSON payloads.
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user is not allowed to access this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, version]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: FireMail
        version:
          type: string
          example: 1.0.0
    ErrorResponse:
      type: object
      additionalProperties: true
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
    SuccessResponse:
      type: object
      additionalProperties: false
      required: [success]
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
          additionalProperties: true
        message:
          type: string
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 6
    UpdateProfileRequest:
      type: object
      additionalProperties: false
      properties:
        display_name:
          type: string
        email:
          type: string
          format: email
    BackupPathRequest:
      type: object
      additionalProperties: false
      required: [backup_path]
      properties:
        backup_path:
          type: string
    SoftDeleteCleanupRequest:
      type: object
      additionalProperties: false
      required: [retention_days]
      properties:
        retention_days:
          type: integer
          minimum: 1
    LoginResponse:
      type: object
      additionalProperties: true
      required: [token, expires_at, user]
      properties:
        token:
          type: string
        expires_at:
          type: string
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
    OAuthInitResponse:
      type: object
      additionalProperties: false
      required: [auth_url, state]
      properties:
        auth_url:
          type: string
        state:
          type: string
    OAuthTokenResponse:
      type: object
      additionalProperties: true
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        scope:
          type: string
    EmailAddress:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        address:
          type: string
          format: email
    EmailAccount:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        group_id:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        email:
          type: string
          format: email
        provider:
          type: string
        auth_method:
          type: string
        is_active:
          type: boolean
        sync_status:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    Email:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        folder_id:
          type: integer
          format: int64
        subject:
          type: string
        from:
          $ref: '#/components/schemas/EmailAddress'
        to:
          type: array
          items:
            $ref: '#/components/schemas/EmailAddress'
        cc:
          type: array
          items:
            $ref: '#/components/schemas/EmailAddress'
        bcc:
          type: array
          items:
            $ref: '#/components/schemas/EmailAddress'
        text_body:
          type: string
        html_body:
          type: string
        is_read:
          type: boolean
        is_starred:
          type: boolean
        is_important:
          type: boolean
        has_attachment:
          type: boolean
        date:
          type: string
    EmailPage:
      type: object
      additionalProperties: true
      properties:
        emails:
          type: array
          items:
            $ref: '#/components/schemas/Email'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
    Folder:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        parent_id:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        display_name:
          type: string
        path:
          type: string
        type:
          type: string
        unread_count:
          type: integer
        total_count:
          type: integer
    EmailGroup:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        name:
          type: string
        color:
          type: string
        sort_order:
          type: integer
        is_default:
          type: boolean
        system_key:
          type: string
          nullable: true
    Attachment:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        email_id:
          type: integer
          format: int64
          nullable: true
        user_id:
          type: integer
          format: int64
          nullable: true
        filename:
          type: string
        content_type:
          type: string
        size:
          type: integer
          format: int64
        is_inline:
          type: boolean
        is_downloaded:
          type: boolean
